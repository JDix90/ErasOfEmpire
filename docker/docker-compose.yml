services:
  postgres:
    image: postgres:16-alpine
    container_name: erasofempire_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chronouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronopass}
      POSTGRES_DB: ${POSTGRES_DB:-erasofempire}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chronouser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7-jammy
    container_name: erasofempire_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-chronouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-chronopass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-erasofempire_maps}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erasofempire_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-chronoredis}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-chronoredis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
  redis_data:
