# Production-style stack: Postgres + Mongo + Redis + Node backend + nginx (static SPA).
# Same-origin: browser uses one URL; nginx proxies /api and /socket.io to the backend.
#
# Usage (from repo root):
#   cp .env.production.example .env.production
#   # Edit secrets and FRONTEND_URL (must match the URL users type in the browser, e.g. https://play.example.com)
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production up -d --build
#
# First-time DB: migrations run on backend startup. Then seed Postgres + Mongo maps:
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production exec backend \
#     sh -c "cd /app/backend && node dist/db/postgres/seed.js"
#   docker compose -f docker/docker-compose.prod.yml --env-file .env.production exec backend \
#     sh -c "cd /app && npx tsx database/seedMaps.ts"
#
# HTTP_PORT maps host port to nginx (default 80).

services:
  postgres:
    image: postgres:16-alpine
    container_name: chronoconquest_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chronouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronopass}
      POSTGRES_DB: ${POSTGRES_DB:-chronoconquest}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-chronouser}']
      interval: 5s
      timeout: 5s
      retries: 12

  mongodb:
    image: mongo:7-jammy
    container_name: chronoconquest_mongo_prod
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-chronouser}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-chronopass}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-chronoconquest_maps}
    volumes:
      - mongo_prod_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.runCommand({ ping: 1 })']
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    container_name: chronoconquest_redis_prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-chronoredis}
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-chronoredis}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 8

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: chronoconquest_backend_prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: '3001'
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      POSTGRES_USER: ${POSTGRES_USER:-chronouser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-chronopass}
      POSTGRES_DB: ${POSTGRES_DB:-chronoconquest}
      MONGO_URI: mongodb://${MONGO_USER:-chronouser}:${MONGO_PASSWORD:-chronopass}@mongodb:27017/${MONGO_DB:-chronoconquest_maps}?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD:-chronoredis}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change_me_in_production_jwt_access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production_jwt_refresh}
      REFRESH_COOKIE_SAME_SITE: ${REFRESH_COOKIE_SAME_SITE:-lax}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"require('http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL:-}
    container_name: chronoconquest_web_prod
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${HTTP_PORT:-80}:80'

volumes:
  postgres_prod_data:
  mongo_prod_data:
  redis_prod_data:
